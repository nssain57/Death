<!DOCTYPE html>
<html>
<head>
  <title>Car Game</title>
  <style>
    body {
      text-align: center;
      background: #111;
      color: white;
    }
    canvas {
      background: #333;
      display: block;
      margin: auto;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h2>Car Game 🚗</h2>

<canvas id="gameCanvas" width="300" height="500"></canvas>

<br>
<button onclick="moveLeft()">⬅ Left</button>
<button onclick="moveRight()">Right ➡</button>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let car = {
  x: 130,
  y: 400,
  width: 40,
  height: 80
};

let obstacles = [];

function drawCar() {
  ctx.fillStyle = "red";
  ctx.fillRect(car.x, car.y, car.width, car.height);
}

function drawRoad() {
  ctx.fillStyle = "#555";
  ctx.fillRect(0, 0, 300, 500);

  ctx.strokeStyle = "white";
  ctx.setLineDash([20, 15]);
  ctx.beginPath();
  ctx.moveTo(150, 0);
  ctx.lineTo(150, 500);
  ctx.stroke();
}

function createObstacle() {
  let width = 40;
  let x = Math.random() * (300 - width);
  obstacles.push({ x: x, y: -80, width: width, height: 80 });
}

function drawObstacles() {
  ctx.fillStyle = "yellow";
  obstacles.forEach(o => {
    ctx.fillRect(o.x, o.y, o.width, o.height);
    o.y += 5;
  });
}

function detectCollision() {
  for (let o of obstacles) {
    if (
      car.x < o.x + o.width &&
      car.x + car.width > o.x &&
      car.y < o.y + o.height &&
      car.y + car.height > o.y
    ) {
      alert("Game Over!");
      document.location.reload();
    }
  }
}

function moveLeft() {
  if (car.x > 0) car.x -= 30;
}

function moveRight() {
  if (car.x < 260) car.x += 30;
}

setInterval(createObstacle, 1500);

function gameLoop() {
  ctx.clearRect(0, 0, 300, 500);

  drawRoad();
  drawCar();
  drawObstacles();
  detectCollision();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
