<!DOCTYPE html>
<html>
<head>
  <title>Real Car Game</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }
    canvas {
      display: block;
      margin: auto;
      background: #222;
    }
    .controls {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
    }
    button {
      padding: 15px 25px;
      font-size: 20px;
      margin: 10px;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas" width="300" height="500"></canvas>

<div class="controls">
  <button id="leftBtn">⬅</button>
  <button id="rightBtn">➡</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// ===== Images =====
const carImg = new Image();
carImg.src = "https://i.imgur.com/7Qp6Y6F.png"; // car image

const enemyImg = new Image();
enemyImg.src = "https://i.imgur.com/Z6X5K0X.png"; // other vehicles

// ===== Player =====
let car = {
  x: 120,
  y: 380,
  width: 60,
  height: 100,
  speed: 5
};

// ===== Controls =====
let leftPressed = false;
let rightPressed = false;

// Hold buttons
document.getElementById("leftBtn").onmousedown = () => leftPressed = true;
document.getElementById("leftBtn").onmouseup = () => leftPressed = false;
document.getElementById("rightBtn").onmousedown = () => rightPressed = true;
document.getElementById("rightBtn").onmouseup = () => rightPressed = false;

// Mobile support
document.getElementById("leftBtn").ontouchstart = () => leftPressed = true;
document.getElementById("leftBtn").ontouchend = () => leftPressed = false;
document.getElementById("rightBtn").ontouchstart = () => rightPressed = true;
document.getElementById("rightBtn").ontouchend = () => rightPressed = false;

// ===== Obstacles =====
let enemies = [];
let speed = 3;

function spawnEnemy() {
  let x = Math.random() * (canvas.width - 60);
  enemies.push({ x: x, y: -100, width: 60, height: 100 });
}
setInterval(spawnEnemy, 1200);

// ===== Road Animation =====
let roadY = 0;

function drawRoad() {
  ctx.fillStyle = "#444";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "white";
  ctx.setLineDash([20, 15]);
  
  for (let i = -500; i < 500; i += 40) {
    ctx.beginPath();
    ctx.moveTo(150, i + roadY);
    ctx.lineTo(150, i + 20 + roadY);
    ctx.stroke();
  }

  roadY += speed;
  if (roadY > 40) roadY = 0;
}

// ===== Draw =====
function drawCar() {
  ctx.drawImage(carImg, car.x, car.y, car.width, car.height);
}

function drawEnemies() {
  enemies.forEach((e, i) => {
    e.y += speed;
    ctx.drawImage(enemyImg, e.x, e.y, e.width, e.height);

    // remove off screen
    if (e.y > canvas.height) enemies.splice(i, 1);
  });
}

// ===== Collision =====
function checkCollision() {
  for (let e of enemies) {
    if (
      car.x < e.x + e.width &&
      car.x + car.width > e.x &&
      car.y < e.y + e.height &&
      car.y + car.height > e.y
    ) {
      alert("💥 Game Over!");
      location.reload();
    }
  }
}

// ===== Game Loop =====
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawRoad();

  // movement
  if (leftPressed && car.x > 0) car.x -= car.speed;
  if (rightPressed && car.x < canvas.width - car.width) car.x += car.speed;

  drawCar();
  drawEnemies();
  checkCollision();

  // speed increase
  speed += 0.002;

  requestAnimationFrame(gameLoop);
}

// Start
carImg.onload = () => {
  gameLoop();
};
</script>

</body>
</html>
