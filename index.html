<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scrolling Bike Race</title>
    <style>
        body { margin: 0; background-color: #87CEEB; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; overflow: hidden; user-select: none; }
        #gameCanvas { background-color: #fff; border: 4px solid #333; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); max-width: 95%; max-height: 80vh; }
        .controls { position: fixed; bottom: 20px; display: flex; gap: 40px; width: 100%; justify-content: center; padding: 0 10px; box-sizing: border-box; }
        .btn { background-color: #e74c3c; color: white; border: none; padding: 25px 35px; font-size: 26px; font-weight: bold; border-radius: 20px; box-shadow: 0 5px 10px rgba(0,0,0,0.3); touch-action: manipulation; flex-grow: 1; text-align: center; }
        .btn:active { background-color: #c0392b; transform: translateY(4px); box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .btn-race { background-color: #2ecc71; }
        .btn-race:active { background-color: #27ae60; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; font-size: 40px; font-weight: bold; z-index: 10; }
        #overlay button { margin-top: 20px; padding: 15px 30px; font-size: 24px; border-radius: 10px; background: #3498db; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="400"></canvas>
    
    <div class="controls">
        <button class="btn" id="btnLeft">Peeche / Tilt Back</button>
        <button class="btn btn-race" id="btnRight">Race / Tilt Fwd</button>
    </div>

    <div id="overlay">
        <div id="overlayText">Level Complete!</div>
        <button id="overlayButton" onclick="handleOverlay()">Next Level</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const overlayText = document.getElementById('overlayText');
        const overlayButton = document.getElementById('overlayButton');

        let currentLevel = 1;
        let isGameOver = false;
        let isLevelComplete = false;
        let cameraX = 0; // CAMERA OFFSET

        // Bike setup
        const bike = {
            x: 100, y: 150,
            w: 50, h: 25,
            dx: 0, dy: 0,
            angle: 0, angVel: 0, torque: 0,
            gravity: 0.6, friction: 0.98,
            grounded: false, wheelRadius: 12
        };

        // Lamba Track (Road)
        const tracks = [
            [ {x: -200, y: 300}, {x: 200, y: 300}, {x: 400, y: 250}, {x: 600, y: 300}, {x: 800, y: 200}, {x: 1000, y: 300}, {x: 1300, y: 300}, {x: 1500, y: 150}, {x: 1800, y: 350}, {x: 2200, y: 350}, {x: 2500, y: 300}, {x: 3000, y: 300} ],
            [ {x: -200, y: 300}, {x: 300, y: 300}, {x: 500, y: 150}, {x: 700, y: 350}, {x: 1000, y: 350}, {x: 1200, y: 200}, {x: 1400, y: 350}, {x: 1800, y: 100}, {x: 2000, y: 350}, {x: 2500, y: 350}, {x: 3000, y: 350} ]
        ];

        const keys = { right: false, left: false };
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');

        const startRight = (e) => { e.preventDefault(); keys.right = true; };
        const stopRight = (e) => { e.preventDefault(); keys.right = false; };
        const startLeft = (e) => { e.preventDefault(); keys.left = true; };
        const stopLeft = (e) => { e.preventDefault(); keys.left = false; };

        btnRight.addEventListener('touchstart', startRight); btnRight.addEventListener('touchend', stopRight);
        btnRight.addEventListener('mousedown', startRight); btnRight.addEventListener('mouseup', stopRight); btnRight.addEventListener('mouseleave', stopRight);
        btnLeft.addEventListener('touchstart', startLeft); btnLeft.addEventListener('touchend', stopLeft);
        btnLeft.addEventListener('mousedown', startLeft); btnLeft.addEventListener('mouseup', stopLeft); btnLeft.addEventListener('mouseleave', stopLeft);

        function findTrackSegment(x) {
            let track = tracks[currentLevel - 1];
            for (let i = 0; i < track.length - 1; i++) {
                if (x >= track[i].x && x <= track[i + 1].x) return i;
            }
            return -1;
        }

        function resetLevel(newLevel) {
            currentLevel = newLevel;
            isGameOver = false; isLevelComplete = false;
            bike.x = 100; bike.y = 150; bike.dx = 0; bike.dy = 0;
            bike.angle = 0; bike.angVel = 0;
            overlay.style.display = 'none';
        }

        function handleOverlay() {
            if (isGameOver) resetLevel(currentLevel);
            else if (isLevelComplete) resetLevel(currentLevel >= tracks.length ? 1 : currentLevel + 1);
        }

        function update() {
            if (isGameOver || isLevelComplete) return;

            bike.dy += bike.gravity;
            bike.y += bike.dy;
            bike.torque = 0;

            if (keys.right) {
                if (bike.grounded) bike.dx += 0.5; // Race
                else bike.torque = 0.05; // Tilt aage
            }
            if (keys.left) {
                if (bike.grounded) bike.dx -= 0.5; // Brake/Peeche
                else bike.torque = -0.05; // Tilt peeche
            }

            bike.angVel += bike.torque;
            bike.angVel *= 0.95;
            bike.angle += bike.angVel;

            bike.grounded = false;
            let seg = findTrackSegment(bike.x);
            let track = tracks[currentLevel - 1];

            if (seg !== -1) {
                let p1 = track[seg], p2 = track[seg + 1];
                let t = (bike.x - p1.x) / (p2.x - p1.x);
                let trackY = p1.y + (p2.y - p1.y) * t - bike.h/2 - bike.wheelRadius;

                if (bike.y >= trackY) {
                    bike.y = trackY;
                    bike.dy = 0;
                    bike.grounded = true;
                    bike.dx *= bike.friction;

                    let targetAngle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
                    if(Math.abs(bike.torque) < 0.01) bike.angle = targetAngle;

                    let angleDeg = bike.angle * (180/Math.PI);
                    if (angleDeg > 120 || angleDeg < -120) {
                        isGameOver = true;
                        overlayText.innerText = "CRASHED! 💥";
                        overlayButton.innerText = "Try Again";
                        overlay.style.display = 'flex';
                    }
                }
            }

            bike.x += bike.dx;

            // Finish Line check
            if (bike.x > track[track.length - 2].x) {
                isLevelComplete = true;
                overlayText.innerText = "Level Complete! 🏁";
                overlayButton.innerText = currentLevel >= tracks.length ? "Play Again" : "Next Level";
                overlay.style.display = 'flex';
            }

            // CAMERA UPDATE: Camera bike ke peeche chalti hai
            cameraX = bike.x - 200; 
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. DUNIYA DRAW KARNA (Camera Offset ke sath)
            ctx.save();
            ctx.translate(-cameraX, 0); // Camera move kar raha hai

            let track = tracks[currentLevel - 1];
            
            // Ground Pahaad
            ctx.fillStyle = '#E2C27D';
            ctx.beginPath();
            ctx.moveTo(track[0].x, canvas.height);
            for (let i = 0; i < track.length; i++) ctx.lineTo(track[i].x, track[i].y);
            ctx.lineTo(track[track.length-1].x, canvas.height);
            ctx.fill();

            // Track Red Line
            ctx.strokeStyle = 'red';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(track[0].x, track[0].y);
            for (let i = 1; i < track.length; i++) ctx.lineTo(track[i].x, track[i].y);
            ctx.stroke();

            // Finish Line flag
            ctx.fillStyle = 'black';
            ctx.fillRect(track[track.length-2].x, track[track.length-2].y - 100, 5, 100);
            ctx.fillStyle = 'white';
            ctx.fillRect(track[track.length-2].x + 5, track[track.length-2].y - 100, 40, 30);
            ctx.fillStyle = 'black';
            ctx.font = '12px Arial';
            ctx.fillText("FINISH", track[track.length-2].x + 7, track[track.length-2].y - 80);

            // Bike Draw Karna
            ctx.save();
            ctx.translate(bike.x, bike.y);
            ctx.rotate(bike.angle);

            // Bike Body
            ctx.fillStyle = '#3498db';
            ctx.fillRect(-bike.w/2, -bike.h/2, bike.w, bike.h);
            
            // Rider
            ctx.fillStyle = '#f1c40f'; // Helmet
            ctx.beginPath(); ctx.arc(-5, -bike.h/2 - 12, 10, 0, Math.PI*2); ctx.fill();

            // Wheels
            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.arc(-bike.w/2 + 10, bike.h/2, bike.wheelRadius, 0, Math.PI * 2);
            ctx.arc(bike.w/2 - 10, bike.h/2, bike.wheelRadius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#fff'; // Rims
            ctx.beginPath();
            ctx.arc(-bike.w/2 + 10, bike.h/2, 4, 0, Math.PI * 2);
            ctx.arc(bike.w/2 - 10, bike.h/2, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore(); // Bike ka rotation hatao
            ctx.restore(); // Camera ka effect hatao taaki score ek jagah ruke

            // 2. UI DRAW KARNA (Bina Camera Offset ke)
            ctx.fillStyle = '#333';
            ctx.font = 'bold 24px Arial';
            ctx.fillText(`Level: ${currentLevel}`, 20, 40);
            
            let distance = Math.floor((bike.x - 100) / 10);
            if (distance < 0) distance = 0;
            ctx.fillText(`Distance: ${distance}m`, 20, 70);
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
