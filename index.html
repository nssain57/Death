<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Game Starter</title>
    <style>
        body {
            margin: 0;
            background-color: #87CEEB; /* Sky blue */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        canvas {
            background-color: #fff;
            border: 4px solid #333;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        p {
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Mini Bike Physics Concept</h2>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <p>Aage peeche jaane ke liye ⬅️ aur ➡️ Arrow keys dabao!</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Simple Bike Object
        const bike = {
            x: 100,
            y: 50,
            width: 50,
            height: 25,
            dx: 0,
            dy: 0,
            gravity: 0.6,
            friction: 0.95,
            grounded: false
        };

        // Track/Zameen
        const groundY = 320;

        // Keys tracking
        const keys = { ArrowRight: false, ArrowLeft: false };

        window.addEventListener('keydown', (e) => {
            if(keys.hasOwnProperty(e.key)) keys[e.key] = true;
        });

        window.addEventListener('keyup', (e) => {
            if(keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        function update() {
            // Gravity lagao
            bike.dy += bike.gravity;
            bike.y += bike.dy;

            // Zameen se takrana
            if (bike.y + bike.height >= groundY) {
                bike.y = groundY - bike.height;
                bike.dy = 0;
                bike.grounded = true;
            } else {
                bike.grounded = false;
            }

            // Aage/Peeche badhna
            if (keys.ArrowRight && bike.grounded) {
                bike.dx += 1;
            }
            if (keys.ArrowLeft && bike.grounded) {
                bike.dx -= 1;
            }

            // Friction (bike ko dheere karne ke liye)
            bike.dx *= bike.friction;
            bike.x += bike.dx;

            // Screen ke bahar jane pe wapas lana
            if(bike.x > canvas.width) bike.x = -bike.width;
            if(bike.x < -bike.width) bike.x = canvas.width;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Zameen draw karna
            ctx.fillStyle = '#E2C27D'; // Sand color
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            
            // Track ki laal line draw karna
            ctx.strokeStyle = 'red';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.stroke();

            // Bike (ek box ki tarah) draw karna
            ctx.fillStyle = '#3498db';
            ctx.fillRect(bike.x, bike.y, bike.width, bike.height);
            
            // Pahiye (Wheels) draw karna
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(bike.x + 10, bike.y + bike.height, 10, 0, Math.PI * 2);
            ctx.arc(bike.x + bike.width - 10, bike.y + bike.height, 10, 0, Math.PI * 2);
            ctx.fill();
        }

        // Game Loop
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Game start
        loop();
    </script>
</body>
</html>
